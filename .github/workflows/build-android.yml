name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      server_url:
        description: "Online app URL loaded by the APK"
        required: false
      allow_http:
        description: "Allow an HTTP server URL for private/internal APK builds"
        required: false
        default: "0"

env:
  CAPACITOR_SERVER_URL: ${{ inputs.server_url || secrets.CAPACITOR_SERVER_URL }}
  CAPACITOR_ALLOW_HTTP: ${{ inputs.allow_http || vars.CAPACITOR_ALLOW_HTTP || '0' }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-36 build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint workspaces
        run: npm run lint --workspaces --if-present

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Build online Android APK
        run: npm run mobile:android:build:online

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: our-memories-debug.apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
