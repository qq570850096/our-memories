services:
  api:
    image: ${OUR_MEMORIES_IMAGE:-ghcr.io/qq570850096/our-memories:latest}
    pull_policy: always
    environment:
      PORT: 8080
      DATABASE_PATH: /app/data/ourMemories.db
      PUBLIC_DIR: /app/public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a long random value before starting}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3002,capacitor://localhost,http://localhost,https://localhost}
      DEFAULT_SPACE_CODE: ${DEFAULT_SPACE_CODE:-our-space-2026}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Admin User}
      AUTO_SEED: ${AUTO_SEED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-our-memories}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_OBJECT_ACL: ${S3_OBJECT_ACL:-}
    ports:
      - "8080:8080"
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  api-data:
